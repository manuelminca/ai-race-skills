name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenClaw and get prefix
        run: |
          npm install -g openclaw
          echo "NPM_PREFIX=$(npm config get prefix)" >> $GITHUB_ENV

      - name: Debug npm paths
        run: |
          echo "NPM_PREFIX=$NPM_PREFIX"
          echo "npm root=$(npm root)"
          ls $(npm root) 2>/dev/null || echo "npm root dir not found"
          ls $(npm root)/openclaw/ 2>/dev/null | head -20
          find /usr/local/lib/node_modules -name "package_skill.py" 2>/dev/null | head -5

      - name: Validate all skills
        run: ./setup/validate-all.sh
        env:
          NPM_PREFIX: ${{ env.NPM_PREFIX }}
